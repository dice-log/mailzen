name: Sync Cloudflare Secret

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Secret target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
      confirm_old_key_backed_up:
        description: "旧鍵を安全な保管先に退避済みか (yes)"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"

jobs:
  sync-secret:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate rotation preconditions
        run: |
          if [ "${{ github.event.inputs.confirm_old_key_backed_up }}" != "yes" ]; then
            echo "Old key backup is required. Re-run with confirm_old_key_backed_up=yes."
            exit 1
          fi

          if [ -z "${ENCRYPTION_KEY}" ]; then
            echo "ENCRYPTION_KEY is empty."
            exit 1
          fi

          if ! echo "${ENCRYPTION_KEY}" | rg -q '^[0-9a-fA-F]{64}$'; then
            echo "ENCRYPTION_KEY must be 64 hex chars."
            exit 1
          fi
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Sync ENCRYPTION_KEY to Cloudflare Workers
        run: printf '%s' "${ENCRYPTION_KEY}" | npx wrangler secret put ENCRYPTION_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
